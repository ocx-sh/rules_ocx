name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup OCX
        uses: ocx-sh/setup-ocx@v1
        with:
          version: "0.3.10"
      - name: Lint (buildifier, actionlint, license headers, links)
        run: ocx run -- task lint

  test:
    name: Test (${{ matrix.os }}, bazel ${{ matrix.bazel }})
    runs-on: ${{ matrix.os }}
    # rolling is forward-compat early-warning only — never blocks.
    continue-on-error: ${{ matrix.bazel == 'rolling' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        bazel: ["8.7.0", "9.x", "rolling"]
    env:
      USE_BAZEL_VERSION: ${{ matrix.bazel }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup OCX
        uses: ocx-sh/setup-ocx@v1
        with:
          version: "0.3.10"
      # Docs-freshness (//docs) is excluded on Bazel != 8.7.0: stardoc under
      # Bazel 9+ emits extra `repo_mapping` attribute rows, so the golden
      # docs/*.md (generated by the pinned dev Bazel via `bazel run //docs:update`)
      # only matches 8.7.0. The dev-pinned Bazel owns docs freshness.
      - name: Unit tests, smoke tests, docs freshness
        run: ocx run -- bazelisk test --verbose_test_summary -- //... ${{ matrix.bazel != '8.7.0' && '-//docs/...' || '' }}

  examples:
    name: Example ${{ matrix.example }} (${{ matrix.os }}, bazel ${{ matrix.bazel }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        example: [project, package, cross_platform]
        bazel: ["8.7.0"]
        # Bazel 9 examples run on Linux only (the examples' arch/OS-specific
        # tests already only execute on the ubuntu leg) — keeps the live-registry
        # fan-out bounded while still proving Bazel 9 consumption end to end.
        include:
          - { os: ubuntu-latest, example: project, bazel: "9.x" }
          - { os: ubuntu-latest, example: package, bazel: "9.x" }
          - { os: ubuntu-latest, example: cross_platform, bazel: "9.x" }
    env:
      USE_BAZEL_VERSION: ${{ matrix.bazel }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup OCX
        uses: ocx-sh/setup-ocx@v1
        with:
          version: "0.3.10"
      - name: Test example (live ocx.sh registry — dogfooding)
        working-directory: examples/${{ matrix.example }}
        run: ocx --project ../../ocx.toml run -- bazelisk test //... --verbose_test_summary

  bcr-parity:
    # Reproduces the BCR presubmit for the e2e/bzlmod test module across all four
    # BCR platforms. BCR's `macos` agent is Intel (x86_64); macos-13 is
    # deprecated, so darwin/amd64 is emulated on the arm64 runner via Rosetta.
    name: BCR test module ${{ matrix.target.name }} (bazel ${{ matrix.bazel }})
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        bazel: ["8.7.0", "9.x"]
        target:
          - { os: ubuntu-latest, name: linux-amd64, rosetta: false }
          - { os: windows-latest, name: windows-amd64, rosetta: false }
          - { os: macos-latest, name: darwin-arm64, rosetta: false }
          - { os: macos-latest, name: darwin-amd64-rosetta, rosetta: true }
    env:
      USE_BAZEL_VERSION: ${{ matrix.bazel }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup OCX
        uses: ocx-sh/setup-ocx@v1
        with:
          version: "0.3.10"
      - name: Build e2e/bzlmod (native ${{ matrix.target.name }})
        if: ${{ !matrix.target.rosetta }}
        working-directory: e2e/bzlmod
        run: ocx --project ../../ocx.toml run -- bazelisk build //...
      - name: Install Rosetta 2
        if: ${{ matrix.target.rosetta }}
        run: softwareupdate --install-rosetta --agree-to-license
      - name: Build e2e/bzlmod as Intel (x86_64 Bazel under Rosetta → darwin/amd64)
        if: ${{ matrix.target.rosetta }}
        working-directory: e2e/bzlmod
        # The repo-rule host arch is the Bazel JVM arch, so darwin/amd64 detection
        # requires an x86_64 Bazel. `arch -x86_64` only re-slices x86_64 binaries
        # and can't downgrade the arm64 bazelisk from the ocx toolchain — so fetch
        # an x86_64 bazelisk directly and launch it under Rosetta. It downloads an
        # x86_64 Bazel (per USE_BAZEL_VERSION) → x86_64 JVM → darwin/amd64, which
        # exercises the darwin/amd64 pin exactly as BCR's Intel agent does.
        run: |
          curl -fsSL -o "$RUNNER_TEMP/bazelisk-x64" \
            https://github.com/bazelbuild/bazelisk/releases/download/v1.29.0/bazelisk-darwin-amd64
          chmod +x "$RUNNER_TEMP/bazelisk-x64"
          arch -x86_64 "$RUNNER_TEMP/bazelisk-x64" build //...

  pin-completeness:
    # Deterministic, arch-independent guard for the class of bug that broke the
    # BCR macOS presubmit: every ocx.package `pins` map must list all four BCR
    # platforms. Catches a missing platform on any runner without emulation.
    name: ocx.package pin completeness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Every pins map covers all four BCR platforms
        shell: bash
        run: |
          set -euo pipefail
          rc=0
          for f in e2e/bzlmod/MODULE.bazel examples/package/MODULE.bazel; do
            blocks=$(grep -c 'pins = {' "$f")
            for p in darwin/amd64 darwin/arm64 linux/amd64 windows/amd64; do
              n=$(grep -c "\"$p\"" "$f") || n=0
              if [ "$n" -ne "$blocks" ]; then
                echo "FAIL $f: platform '$p' appears $n time(s), expected $blocks (one per pins block)"
                rc=1
              fi
            done
            if [ "$rc" -eq 0 ]; then echo "OK $f ($blocks pins block(s), all four platforms present)"; fi
          done
          exit "$rc"

  offline:
    name: Offline determinism (bazel ${{ matrix.bazel }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bazel: ["8.7.0", "9.x"]
    env:
      USE_BAZEL_VERSION: ${{ matrix.bazel }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup OCX
        uses: ocx-sh/setup-ocx@v1
        with:
          version: "0.3.10"
      - name: Warm fetch
        run: ocx run -- bazelisk fetch @dev_tools//...
      - name: Refetch offline against the warmed store (must succeed)
        run: OCX_OFFLINE=1 ocx run -- bazelisk fetch --force @dev_tools//...
      - name: Refetch offline against an empty store (must fail)
        run: |
          if OCX_HOME="$RUNNER_TEMP/empty-ocx-home" OCX_OFFLINE=1 \
             ocx run -- bazelisk fetch --force @dev_tools//...; then
            echo "expected the offline fetch against an empty store to fail" >&2
            exit 1
          fi
          echo "offline failure mode OK"
