name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup OCX
        uses: ocx-sh/setup-ocx@v1
        with:
          version: "0.3.10"
      - name: Verify tag matches MODULE.bazel version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          module="$(sed -n 's/.*version = "\([0-9][^"]*\)".*/\1/p' MODULE.bazel | head -1)"
          if [ "$tag" != "$module" ]; then
            echo "tag v$tag does not match MODULE.bazel version $module" >&2
            exit 1
          fi
      - name: Build BCR-compatible source archive
        run: |
          version="${GITHUB_REF_NAME#v}"
          prefix="rules_ocx-$version"
          archive="rules_ocx-$GITHUB_REF_NAME.tar.gz"
          git archive --format=tar.gz --prefix="$prefix/" -o "$archive" "$GITHUB_REF_NAME"
          integrity="sha256-$(openssl dgst -sha256 -binary "$archive" | openssl base64 -A)"
          echo "integrity: $integrity" | tee integrity.txt
      - name: Generate release notes
        run: ocx run -- git-cliff --latest --strip header -o notes.md
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease=""
          case "$GITHUB_REF_NAME" in *-*) prerelease="--prerelease" ;; esac
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file notes.md \
            $prerelease \
            "rules_ocx-$GITHUB_REF_NAME.tar.gz" integrity.txt

  publish-to-bcr:
    name: Submit to BCR
    needs: release
    # Skip prereleases (tags like v1.2.3-rc1) — the registry takes final versions.
    if: ${{ !contains(github.ref_name, '-') }}
    permissions:
      contents: write
    secrets: inherit
    uses: ./.github/workflows/publish.yaml
    with:
      tag_name: ${{ github.ref_name }}
