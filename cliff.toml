# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration
#
# Based on the built-in keepachangelog preset, customized for OCX.

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
body = """
{%- if commits | length == 0 -%}
{%- else -%}
{%- if version %}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{%- else %}
## [Unreleased]
{%- endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | upper_first | trim | replace(from="<", to="&lt;") | replace(from=">", to="&gt;") }}\
{% if commit.scope %} *({{ commit.scope }})*{% endif %}\
{% if commit.breaking %} **BREAKING**{% endif %}
{%- endfor %}
{% endfor %}
{%- endif -%}
"""
footer = """
{% for release in releases -%}
    {% if release.version -%}
        {% if release.previous.version -%}
            [{{ release.version | trim_start_matches(pat="v") }}]: \
                https://github.com/ocx-sh/ocx\
                    /compare/{{ release.previous.version }}..{{ release.version }}
        {% else -%}
            [{{ release.version | trim_start_matches(pat="v") }}]: \
                https://github.com/ocx-sh/ocx/tree/{{ release.version }}
        {% endif -%}
    {% else -%}
        {% if release.previous.version -%}
            [unreleased]: https://github.com/ocx-sh/ocx\
                /compare/{{ release.previous.version }}..HEAD
        {% endif -%}
    {% endif -%}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^refactor", group = "Changed" },
    { message = "^perf", group = "Changed" },
    { message = "^doc", group = "Documentation" },
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^style", skip = true },
    { message = "^test", skip = true },
    { message = "^build", skip = true },
]
tag_pattern = "v[0-9].*"
sort_commits = "oldest"

[bump]
initial_tag = "v0.1.0"
features_always_bump_minor = true
breaking_always_bump_major = false # stay pre-1.0 until intentional
